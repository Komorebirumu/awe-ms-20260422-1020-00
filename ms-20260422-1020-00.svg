<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-blue-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9013FE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-pink-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7C0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3C7E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Gradient -->
  <rect width="100%" height="100%" fill="url(#gradient-blue-purple)" />

  <!-- Central Element: AI Brain/Network -->
  <g transform="translate(400, 300) scale(1.2)">
    <circle cx="0" cy="0" r="80" fill="rgba(255,255,255,0.8)" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#gradient-pink-orange)" stroke-width="8" stroke-dasharray="15,10"/>

    <!-- AI Nodes -->
    <circle cx="0" cy="-50" r="15" fill="#FFFFFF"/>
    <circle cx="-40" cy="30" r="15" fill="#FFFFFF"/>
    <circle cx="40" cy="30" r="15" fill="#FFFFFF"/>
    <circle cx="0" cy="70" r="15" fill="#FFFFFF"/>

    <!-- Connecting Lines -->
    <line x1="0" y1="-50" x2="-20" y2="-15" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="0" y1="-50" x2="20" y2="-15" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="-40" y1="30" x2="-20" y2="15" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="-40" y1="30" x2="0" y2="55" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="40" y1="30" x2="20" y2="15" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="40" y1="30" x2="0" y2="55" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Icon: Stylized Dress Silhouette -->
  <g transform="translate(100, 200) scale(0.8)">
    <path d="M0 0 L20 0 L20 100 L0 100 Z" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M10 0 C 15 0, 20 5, 20 10 L20 100 C 20 110, 15 120, 10 120 C 5 120, 0 110, 0 100 L0 10 C 0 5, 5 0, 10 0 Z" fill="rgba(255, 255, 255, 0.6)" stroke="#FFFFFF" stroke-width="3"/>
    <!-- Simple bodice details -->
    <line x1="5" y1="20" x2="15" y2="20" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="10" y1="20" x2="10" y2="40" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Skirt flare -->
    <path d="M0 100 C 10 130, 30 130, 20 100 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Icon: Historical Crown/Tiara -->
  <g transform="translate(650, 150) scale(0.6)">
    <path d="M0 -30 L10 -10 L20 0 L30 -10 L40 -30 L30 -20 L20 -40 L10 -20 L0 -30 Z" fill="rgba(255, 255, 255, 0.7)" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="20" cy="-20" r="5" fill="#FFD700"/>
    <circle cx="10" cy="-15" r="3" fill="#FFD700"/>
    <circle cx="30" cy="-15" r="3" fill="#FFD700"/>
  </g>

  <!-- Text Element: Niche Title -->
  <text x="50%" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">
    AI-Powered Niche Historical Fashion Illustrator
  </text>
  <text x="50%" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#DDDDDD">
    For Cosplayers
  </text>

</svg>